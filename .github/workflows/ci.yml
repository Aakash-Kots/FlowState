name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # node-gyp@9 (used by electron-builder's install-app-deps postinstall to
      # rebuild node-pty) imports distutils, which was removed from Python 3.12+.
      # macos-latest runners default to 3.12+, so pin 3.11 which still ships it.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build (renderer export + main bundle)
        run: bun run build
        # Linear OAuth credentials are inlined into the main bundle at build time
        # (electron-vite `define`). Provided as repo secrets; empty on forked PRs,
        # which just disables the Linear connect flow in that build.
        env:
          LINEAR_CLIENT_ID: ${{ secrets.LINEAR_CLIENT_ID }}
          LINEAR_CLIENT_SECRET: ${{ secrets.LINEAR_CLIENT_SECRET }}

  # Release workflow (sign, notarize, DMG, publish) is added once Developer ID
  # signing certificates are available in repo secrets. See docs/ARCHITECTURE.md §5.
  # NOTE: that release job's `bun run dist` step needs the same LINEAR_CLIENT_ID /
  # LINEAR_CLIENT_SECRET `env:` block so the published app has the creds baked in.
