name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # node-gyp@9 (used by electron-builder's install-app-deps postinstall to
      # rebuild node-pty) imports distutils, which was removed from Python 3.12+.
      # macos-latest runners default to 3.12+, so pin 3.11 which still ships it.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build (renderer export + main bundle)
        run: bun run build
        # Linear + Spotify OAuth client credentials are inlined into the main
        # bundle at build time (electron-vite `define`). Provided as repo secrets;
        # empty on forked PRs, which just disables those connect flows in that
        # build. Spotify uses PKCE, so only its client id is needed (no secret).
        env:
          LINEAR_CLIENT_ID: ${{ secrets.LINEAR_CLIENT_ID }}
          LINEAR_CLIENT_SECRET: ${{ secrets.LINEAR_CLIENT_SECRET }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}

  # The Windows release job lives in release.yml (windows-latest, on `v*` tag or
  # manual dispatch). The macOS release job (sign, notarize, DMG, publish) is
  # added there once Developer ID signing certificates are in repo secrets — see
  # docs/ARCHITECTURE.md §5. Any release job's build step needs the same
  # LINEAR_CLIENT_ID / LINEAR_CLIENT_SECRET / SPOTIFY_CLIENT_ID `env:` block so the
  # published app has the creds baked in.
