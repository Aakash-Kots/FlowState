name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build (renderer export + main bundle)
        run: bun run build

  # Release workflow (sign, notarize, DMG, publish) is added once Developer ID
  # signing certificates are available in repo secrets. See docs/ARCHITECTURE.md §5.
